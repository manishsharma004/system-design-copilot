<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Design Copilot</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero panel">
        <div class="hero-copy">
          <p class="eyebrow">Interactive system design primer</p>
          <h1 id="hero-title"></h1>
          <p id="hero-subtitle" class="hero-text"></p>
          <div class="hero-actions">
            <button id="jump-to-next" class="primary-button" type="button">Continue next lesson</button>
            <button id="mark-current-topic" class="ghost-button" type="button">Mark lesson complete</button>
          </div>
        </div>
        <div class="hero-side">
          <div class="hero-card">
            <p class="hero-card-label">Study loop</p>
            <ol id="study-loop"></ol>
          </div>
          <div class="hero-card">
            <p class="hero-card-label">Progress</p>
            <div id="overview-grid" class="overview-grid"></div>
          </div>
        </div>
      </header>

      <main class="app-grid">
        <aside class="panel sidebar-panel">
          <div class="panel-heading compact">
            <div>
              <p class="eyebrow">Learner mode</p>
              <h2>Pick your depth</h2>
            </div>
          </div>
          <div id="mode-selector" class="mode-selector" aria-label="Learner modes"></div>
          <p id="mode-description" class="mode-description"></p>

          <label class="search-field">
            <span>Search lessons</span>
            <input id="topic-search" type="search" placeholder="Search topics, subtopics, and concepts" />
          </label>

          <div class="panel-heading compact topic-list-heading">
            <div>
              <p class="eyebrow">Lesson navigator</p>
              <h2>Topic map</h2>
            </div>
            <p id="progress-copy" class="progress-copy"></p>
          </div>
          <div id="topic-list" class="topic-list" aria-live="polite"></div>
        </aside>

        <section class="panel lesson-panel">
          <div id="lesson-detail"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
